name: CI/CD for simple_http_checker

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Display Python Version and Location
        run: |
          python --version
          which python
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"
      - name: Linting and Formatting Checks
        run: |
          ruff check .
          black --check .
      - name: Static Types Check
        run: mypy src/
      - name: Static Security Check
        run: bandit -c pyproject.toml -r .